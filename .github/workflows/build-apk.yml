name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate platform folders
        run: flutter create --platforms=android --org com.castro.panini2026 .

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: panini-2026-apks-split
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: panini-2026-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
